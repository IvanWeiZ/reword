<div id="main" class="two">
  <header>
    <span title="John Doe">John Doe</span>
  </header>
  <div class="copyable-area">
    <div data-testid="conversation-panel-messages">
      <div data-testid="msg-container" class="message-in">
        <div class="copyable-text" data-pre-plain-text="[10:30, 3/17/2026] Alex: ">
          <span class="selectable-text"><span>Hey, can we talk about the project?</span></span>
        </div>
      </div>
      <div data-testid="msg-container" class="message-out">
        <div class="copyable-text" data-pre-plain-text="[10:31, 3/17/2026] Me: ">
          <span class="selectable-text"><span>Sure, what's up?</span></span>
        </div>
      </div>
      <div data-testid="msg-container" class="message-in">
        <div class="copyable-text" data-pre-plain-text="[10:32, 3/17/2026] Alex: ">
          <span class="selectable-text"><span>I think we need to change the deadline.</span></span>
        </div>
      </div>
    </div>
    <footer>
      <div class="input-container">
        <div
          contenteditable="true"
          data-tab="10"
          role="textbox"
          class="lexical-rich-text-input"
          title="Type a message"
          spellcheck="true"
        ></div>
      </div>
      <span data-testid="send">
        <button aria-label="Send" type="button">
          <span data-icon="send"></span>
        </button>
      </span>
    </footer>
  </div>
</div>
