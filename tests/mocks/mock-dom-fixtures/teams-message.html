<div class="ts-messages-container">
  <div data-tid="chat-pane-message">
    <span data-tid="message-author-name">Alice</span>
    <div data-tid="message-body">Hey, can you review the PR when you get a chance?</div>
  </div>
  <div data-tid="chat-pane-message">
    <span data-tid="message-author-name">You</span>
    <div data-tid="message-body">Sure, I'll look at it now</div>
  </div>
  <div data-tid="message-pane-compose-box">
    <div data-tid="ckeditor" contenteditable="true" role="textbox">
    </div>
  </div>
  <div data-tid="newMessageCommands">
    <button data-tid="newMessageCommands-send" aria-label="Send">Send</button>
  </div>
</div>
