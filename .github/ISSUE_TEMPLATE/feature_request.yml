name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: Platform(s) affected
      multiple: true
      options:
        - All platforms
        - Gmail
        - LinkedIn
        - Twitter/X
        - Slack
        - Discord
        - Options page
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
